<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribots | Incoming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-mug-hot brand-icon"></i>
                <span class="brand-name" style="font-family: 'Playfair Display', serif; font-style: italic;">Tribots</span>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="storage.html" class="nav-item">
                    <i class="fa-solid fa-box-open"></i>
                    <span>Storage</span>
                </a>
                <a href="stock-in.html" class="nav-item">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Stock In</span>
                </a>
                <a href="stock-out.html" class="nav-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Stock Out</span>
                </a>
                <a href="incoming.html" class="nav-item active">
                    <i class="fa-solid fa-truck-fast"></i>
                    <span>Incoming</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="nav-item logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Search deliveries..." id="searchInput">
                </div>
                
                <div class="user-profile">
                    <div class="notification">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">2</span>
                    </div>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=4a2c11&color=fff" alt="User Avatar">
                    </div>
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Manager</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Incoming Deliveries</h1>
                        <p class="page-subtitle">Track ingredients currently in transit</p>
                    </div>
                    <button class="btn btn-primary" id="addDeliveryBtn">
                        <i class="fa-solid fa-plus"></i> Log Delivery
                    </button>
                </div>

                <!-- Incoming Table Area -->
                <div class="table-container">
                    <div class="table-header">
                        <h2>In-Transit Orders</h2>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Ingredient</th>
                                    <th>Supplier (From)</th>
                                    <th>Amount Incoming</th>
                                    <th>Order Date</th>
                                    <th>Total Cost</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="incomingTableBody">
                                <!-- Rows will be populated by app.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Delivery Modal -->
    <div class="modal-overlay" id="deliveryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Log Incoming Delivery</h2>
                <button class="close-modal" id="closeDeliveryModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="deliveryForm">
                    <div class="form-group">
                        <label>Ingredient</label>
                        <input type="text" id="delIngredient" required placeholder="e.g. Mocha Syrup">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Supplier</label>
                            <input type="text" id="delSupplier" required placeholder="e.g. Local Bean Co.">
                        </div>
                        <div class="form-group">
                            <label>Amount Incoming</label>
                            <input type="text" id="delAmount" required placeholder="e.g. 50 bottles">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Order Date</label>
                            <input type="date" id="delDate" required>
                        </div>
                        <div class="form-group">
                            <label>Total Cost (₱)</label>
                            <input type="number" id="delCost" required min="0" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelDeliveryBtn">Cancel</button>
                <button class="btn btn-primary" id="saveDeliveryBtn">Save Delivery</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
