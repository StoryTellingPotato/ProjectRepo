<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribots | Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-mug-hot brand-icon"></i>
                <span class="brand-name" style="font-family: 'Playfair Display', serif; font-style: italic;">Tribots</span>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="storage.html" class="nav-item active">
                    <i class="fa-solid fa-box-open"></i>
                    <span>Storage</span>
                </a>
                <a href="stock-in.html" class="nav-item">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Stock In</span>
                </a>
                <a href="stock-out.html" class="nav-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Stock Out</span>
                </a>
                <a href="incoming.html" class="nav-item">
                    <i class="fa-solid fa-truck-fast"></i>
                    <span>Incoming</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="nav-item logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Search ingredients..." id="searchInput">
                </div>
                
                <div class="user-profile">
                    <div class="notification">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">2</span>
                    </div>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=4a2c11&color=fff" alt="User Avatar">
                    </div>
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Manager</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Storage Details</h1>
                        <p class="page-subtitle">Manage ingredient details, edit items, and delete records</p>
                    </div>
                    <button class="btn btn-primary" id="addProductBtn">
                        <i class="fa-solid fa-plus"></i> Add Ingredient
                    </button>
                </div>

                <!-- Ingredients Table Area -->
                <div class="table-container">
                    <div class="table-header">
                        <h2>All Ingredients in Storage</h2>
                        <div class="table-actions">
                            <button class="btn btn-icon"><i class="fa-solid fa-filter"></i> Filter</button>
                            <button class="btn btn-icon"><i class="fa-solid fa-download"></i> Export</button>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Ingredient Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="storageTableBody">
                                <!-- Rows will be populated by app.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Ingredient</h2>
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label for="productName">Ingredient Name</label>
                        <input type="text" id="productName" required placeholder="e.g. Arabica Beans (1kg)">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" required>
                                <option value="1">Coffee Beans</option>
                                <option value="2">Syrups & Sauces</option>
                                <option value="3">Dairy & Milk</option>
                                <option value="4">Packaging</option>
                                <option value="5">Pastries/Food</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="productSupplier">Supplier</label>
                            <select id="productSupplier" required>
                                <option value="1">Local Bean Co.</option>
                                <option value="2">Sweet Treats Bakery</option>
                                <option value="3">Global Mugs Inc.</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productPrice">Cost per Unit (₱)</label>
                            <input type="number" id="productPrice" required min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="productStock">Initial Stock</label>
                            <input type="number" id="productStock" required min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label for="productUnit">Unit</label>
                            <input type="text" id="productUnit" value="bags" placeholder="e.g. bags, bottles">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
                <button class="btn btn-primary" id="saveProductBtn">Save Ingredient</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
